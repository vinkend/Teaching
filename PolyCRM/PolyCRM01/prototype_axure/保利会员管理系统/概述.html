        <div id="u13_text" class="text ">
          <p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">背景：</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">1、当前酒店</span><span style="font-family:'ArialMT', 'Arial', sans-serif;">PMS</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">已具备订单、住客、结算等基础能力，但档案管理分散在前台、销售、渠道和财务模块，存在重复录入、字段不统一、会员关联弱的问题。</span></p><p><span style="font-family:'ArialMT', 'Arial', sans-serif;">2</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">、协议公司与旅行社的销售线索、合同周期、价格政策在不同系统（如</span><span style="font-family:'ArialMT', 'Arial', sans-serif;">CRS</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">、渠道平台）重复维护，影响效率与一致性。</span></p>
        </div>
      </div>

      <!-- Unnamed (矩形) -->
      <div id="u14" class="ax_default box_1">
        <div id="u14_div" class=""></div>
        <div id="u14_text" class="text ">
          <p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">目标：</span></p><p><span style="font-family:'Helvetica', sans-serif;">1</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">、建立统一“档案中心”，覆盖个人档案、公司档案、旅行社档案、团队档案，形成唯一主数据。</span></p><p><span style="font-family:'Helvetica', sans-serif;">2</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">、明确定义“档案”与“会员”的关系模型，实现自动带入、权限隔离、生命周期闭环。</span></p><p><span style="font-family:'Helvetica', sans-serif;">3</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">、与销售、预订、入住、结算、会员等业务流程打通，降低重复录入与错配率。</span></p>
        </div>
      </div>
